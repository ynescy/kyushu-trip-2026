<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>北九州別府溫泉・福岡城市漫遊 2026</title>
<style>
:root{
  --bg:#FAF7F2;--bg2:#F0EBE3;--card:#fff;
  --pri:#C17F4A;--pri-lt:#E8A87C;
  --grn:#6B9E78;--grn-lt:rgba(107,158,120,.12);
  --txt:#3D3530;--txt2:#7A6F68;--txt3:#ABA39C;
  --red:#C94040;--red-lt:rgba(201,64,64,.08);
  --bdr:#E8E0D8;--shd:0 2px 10px rgba(61,53,48,.07);
  --r:14px;--nav:60px;--hdr:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC','Microsoft JhengHei','Segoe UI',sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}

/* ── Header ── */
#hdr{flex-shrink:0;height:var(--hdr);background:var(--pri);
  display:flex;align-items:center;padding:0 16px;gap:10px}
.hdr-sakura{font-size:22px;line-height:1}
.hdr-text{display:flex;flex-direction:column}
.hdr-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px}
.hdr-sub{color:rgba(255,255,255,.7);font-size:11px;margin-top:1px}

/* ── Main ── */
#main{flex:1;overflow:hidden;position:relative}
.tab{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.tab.on{display:flex}

/* ── Day selector ── */
#day-bar{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);
  display:flex;gap:7px;padding:9px 12px;overflow-x:auto;scrollbar-width:none}
#day-bar::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:6px 10px;border-radius:22px;border:1.5px solid var(--bdr);
  cursor:pointer;transition:all .18s;min-width:58px;background:var(--bg)}
.dp.on{background:var(--pri);border-color:var(--pri)}
.dp-date{font-size:13px;font-weight:700;color:var(--txt)}
.dp.on .dp-date{color:#fff}
.dp-lbl{font-size:9px;color:var(--txt3);margin-top:1px;max-width:56px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.dp.on .dp-lbl{color:rgba(255,255,255,.75)}

/* ── Day content scroll ── */
#day-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Day header ── */
.day-hdr{padding:14px 16px 10px}
.day-hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.day-name{font-size:17px;font-weight:700}
.day-wx{font-size:12px;color:var(--txt2);background:var(--bg2);padding:3px 9px;border-radius:16px;white-space:nowrap}
.day-hi{font-size:13px;color:var(--txt2)}
.day-cost{display:inline-block;margin-top:5px;font-size:11px;color:var(--pri);
  background:rgba(193,127,74,.1);padding:3px 9px;border-radius:10px}

/* ── Timeline ── */
.tl{padding:6px 16px 24px}
.tl-row{display:grid;grid-template-columns:46px 18px 1fr;gap:0 8px;align-items:start}
.tl-t{padding-top:16px;text-align:right;font-size:10px;color:var(--txt3);font-weight:500;line-height:1.3}
.tl-spine{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--pri);
  flex-shrink:0;margin-top:17px;border:2px solid var(--bg);
  box-shadow:0 0 0 2px var(--pri)}
.tl-line{width:2px;background:var(--bdr);flex:1;min-height:10px}
.tl-row:last-child .tl-line{opacity:0}
.tl-card{background:var(--card);border-radius:12px;padding:10px 12px;
  margin:8px 0 4px;box-shadow:var(--shd)}
.tl-head{display:flex;align-items:flex-start;gap:8px}
.tl-ico{font-size:18px;flex-shrink:0;line-height:1.3}
.tl-body{flex:1;min-width:0}
.tl-ttl{font-size:14px;font-weight:600;color:var(--txt)}
.tl-ttl.alert{color:var(--red)}
.tl-dsc{font-size:12px;color:var(--txt2);margin-top:2px;line-height:1.45}
.tl-note{margin-top:4px;font-size:11px;color:var(--pri);font-weight:600}
.map-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;
  padding:5px 11px;background:var(--grn);color:#fff;border-radius:20px;
  font-size:11px;font-weight:700;text-decoration:none;letter-spacing:.3px}

/* ── Section label ── */
.sec-lbl{padding:16px 16px 8px;font-size:11px;font-weight:700;
  color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}

/* ── Generic scroll tab ── */
.scroll-tab{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}

/* ── Transport card ── */
.tc{background:var(--card);border-radius:var(--r);margin:0 16px 12px;
  box-shadow:var(--shd);overflow:hidden;flex-shrink:0}
.tc-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px}
.tc-hdr.blue{background:linear-gradient(135deg,#283593,#3949AB)}
.tc-hdr.amber{background:linear-gradient(135deg,#7B4F2B,var(--pri))}
.tc-hdr.green{background:linear-gradient(135deg,#3D7A50,var(--grn))}
.tc-ico{font-size:22px}
.tc-ti{display:flex;flex-direction:column}
.tc-name{font-size:15px;font-weight:700}
.tc-sub{font-size:12px;opacity:.8;margin-top:1px}
.tc-hdr.blue .tc-name,.tc-hdr.blue .tc-sub,
.tc-hdr.amber .tc-name,.tc-hdr.amber .tc-sub,
.tc-hdr.green .tc-name,.tc-hdr.green .tc-sub{color:#fff}
.tc-body{padding:2px 14px 12px}
.tc-row{display:flex;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bdr)}
.tc-row:last-child{border-bottom:none}
.tc-lbl{width:72px;font-size:11px;color:var(--txt3);flex-shrink:0;padding-top:1px;font-weight:600}
.tc-val{font-size:13px;color:var(--txt);flex:1;line-height:1.4}
.tc-val.mono{font-family:'Courier New',monospace;font-weight:700;color:var(--pri);font-size:14px;letter-spacing:1px}
.tc-val.red{color:var(--red);font-weight:700}
.warn-box{margin:0 14px 12px;padding:9px 12px;background:var(--red-lt);
  border-left:3px solid var(--red);border-radius:0 8px 8px 0;
  font-size:12px;color:var(--red);font-weight:600;line-height:1.5}
.bk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bk-row:last-child{border-bottom:none}
.bk-ppl{flex:1;font-size:13px;color:var(--txt)}
.bk-code{font-family:'Courier New',monospace;font-weight:700;font-size:14px;color:var(--pri);letter-spacing:1px}
.bk-bag{font-size:11px;color:var(--txt3)}
.city-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bdr)}
.city-row:last-child{border-bottom:none}
.city-name{font-size:13px;color:var(--txt)}
.city-price{font-size:13px;color:var(--pri);font-weight:600}

/* ── Hotel card ── */
.hc{background:var(--card);border-radius:var(--r);margin:0 16px 12px;
  box-shadow:var(--shd);overflow:hidden}
.hc-hdr{padding:14px 16px;background:linear-gradient(135deg,#7B4F2B,var(--pri-lt))}
.hc-name{font-size:16px;font-weight:700;color:#fff}
.hc-loc{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px}
.hc-warn{margin:0;padding:9px 16px;background:var(--red-lt);
  font-size:12px;color:var(--red);font-weight:600;border-bottom:1px solid var(--bdr)}
.hc-body{padding:4px 16px 8px}
.hc-row{display:flex;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bdr)}
.hc-row:last-child{border-bottom:none}
.hc-lbl{width:60px;font-size:11px;color:var(--txt3);flex-shrink:0;font-weight:600;padding-top:1px}
.hc-val{font-size:13px;color:var(--txt);flex:1;line-height:1.4;white-space:pre-line}
.hc-val.ok{color:var(--grn);font-size:12px}
.hc-val.sm{font-size:12px;color:var(--txt2)}
.hc-foot{padding:10px 16px 14px;display:flex;gap:8px}
.hc-map{display:flex;align-items:center;gap:5px;padding:8px 16px;
  background:var(--grn);color:#fff;border-radius:20px;
  font-size:13px;font-weight:700;text-decoration:none}

/* ── Packing ── */
.pack-prog{margin:14px 16px 10px}
.prog-row{display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);margin-bottom:7px}
.prog-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--grn);border-radius:3px;transition:width .3s}
.pack-cat{margin:0 16px 2px}
.pack-cat-ttl{font-size:14px;font-weight:700;color:var(--txt);padding:12px 0 8px;display:flex;align-items:center;gap:6px}
.pi{display:flex;align-items:center;gap:10px;padding:9px 12px;
  background:var(--card);border-radius:10px;margin-bottom:6px;
  cursor:pointer;box-shadow:var(--shd);transition:opacity .2s}
.pi.chk{opacity:.45}
.pi.chk .pi-txt{text-decoration:line-through;color:var(--txt3)}
.pi-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--bdr);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pi.chk .pi-box{background:var(--grn);border-color:var(--grn)}
.pi.chk .pi-box::after{content:"✓";color:#fff;font-size:13px;font-weight:700}
.pi-txt{font-size:13px;color:var(--txt);flex:1}
.pack-note{text-align:center;padding:14px 16px;font-size:12px;color:var(--txt3);line-height:1.6}

/* ── Phrases tab ── */
#scn-bar{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);
  display:flex;gap:7px;padding:9px 12px;overflow-x:auto;scrollbar-width:none}
#scn-bar::-webkit-scrollbar{display:none}
.sp{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bdr);
  cursor:pointer;transition:all .18s;background:var(--bg);
  font-size:12px;font-weight:600;color:var(--txt2);white-space:nowrap}
.sp.on{background:var(--pri);border-color:var(--pri);color:#fff}
#phrase-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.ph-card{background:var(--card);border-radius:12px;padding:14px 14px 12px;
  margin-bottom:10px;box-shadow:var(--shd);display:flex;align-items:flex-start;gap:10px}
.ph-txt{flex:1;min-width:0}
.ph-jp{font-size:17px;font-weight:700;color:var(--pri);line-height:1.4;margin-bottom:4px}
.ph-zh{font-size:13px;color:var(--txt);margin-bottom:3px}
.ph-rm{font-size:11px;color:var(--txt3);font-style:italic}
.ph-voice{flex-shrink:0;width:40px;height:40px;border-radius:50%;
  background:var(--pri);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;box-shadow:0 2px 8px rgba(193,127,74,.3)}
.ph-voice:active{transform:scale(.92);background:var(--pri-lt)}
.ph-voice.speaking{background:var(--grn);animation:pulse .7s infinite alternate}
@keyframes pulse{from{box-shadow:0 2px 8px rgba(107,158,120,.3)}to{box-shadow:0 2px 16px rgba(107,158,120,.6)}}
.ph-tip{text-align:center;padding:10px 0 20px;font-size:12px;color:var(--txt3);line-height:1.6}
.no-tts{display:none;margin:12px 16px;padding:10px 12px;background:var(--red-lt);
  border-left:3px solid var(--red);border-radius:0 8px 8px 0;
  font-size:12px;color:var(--red)}

/* ── Bottom nav ── */
#nav{flex-shrink:0;height:var(--nav);background:var(--card);
  display:flex;border-top:1px solid var(--bdr)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;gap:2px;padding:6px 0;transition:all .15s}
.nb-ico{font-size:21px;line-height:1;transition:transform .15s}
.nb-lbl{font-size:10px;font-weight:600;color:var(--txt3)}
.nb.on .nb-lbl{color:var(--pri)}
.nb.on .nb-ico{transform:scale(1.12)}

.pad{height:24px}

/* ══ Split / 分帳 ══════════════════════════════ */
.split-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;flex-shrink:0}
.split-ttl{font-size:17px;font-weight:700}
.gear-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;opacity:.7}
.mem-cards{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.mem-cards::-webkit-scrollbar{display:none}
.mem-card{flex-shrink:0;background:var(--card);border-radius:12px;padding:8px 12px;box-shadow:var(--shd);text-align:center;min-width:72px}
.mem-card-name{font-size:11px;font-weight:600;color:var(--txt2)}
.mem-card-amt{font-size:14px;font-weight:700;color:var(--pri);margin-top:2px}
.mem-card-amt.neg{color:var(--red)}
.split-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.exp-sec-lbl{padding:14px 16px 6px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}
.exp-card{background:var(--card);border-radius:12px;margin:0 16px 8px;padding:10px 12px;box-shadow:var(--shd);display:flex;align-items:flex-start;gap:10px}
.exp-ico-w{font-size:22px;flex-shrink:0;line-height:1.3;padding-top:1px}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:600;color:var(--txt)}
.exp-sub{font-size:11px;color:var(--txt2);margin-top:2px;line-height:1.4}
.exp-nt{font-size:11px;color:var(--pri);margin-top:2px}
.exp-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.exp-jpy{font-size:15px;font-weight:700;color:var(--pri)}
.exp-myr{font-size:10px;color:var(--txt3)}
.exp-del-btn{background:none;border:none;color:var(--txt3);font-size:15px;cursor:pointer;padding:2px}
.settle-box{margin:10px 16px;background:var(--grn-lt);border:1.5px solid var(--grn);border-radius:12px;padding:12px 14px}
.settle-hd{font-size:13px;font-weight:700;color:var(--grn);margin-bottom:8px}
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(107,158,120,.2);font-size:13px;color:var(--txt)}
.settle-row:last-child{border:none}
.settle-val{text-align:right}
.settle-jpy{font-weight:700;color:var(--grn);display:block}
.settle-rm{font-size:10px;color:var(--txt3);display:block}
.share-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 16px 4px;padding:11px;background:var(--grn);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 32px)}
.share-btn:active{opacity:.85}
.empty-hint{text-align:center;padding:40px 16px;color:var(--txt3);font-size:14px;line-height:1.8}
#fab-add{position:fixed;bottom:76px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--pri);color:#fff;font-size:28px;border:none;box-shadow:0 4px 16px rgba(193,127,74,.5);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50;transition:transform .15s}
#fab-add:active{transform:scale(.92)}
.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:none;align-items:flex-end;justify-content:center}
.m-ov.open{display:flex}
.m-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding-bottom:32px}
.m-pill{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 0}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.m-title{font-size:17px;font-weight:700}
.m-close{background:none;border:none;font-size:22px;color:var(--txt2);cursor:pointer;line-height:1;padding:4px}
.m-body{padding:10px 16px 0}
.m-lbl{font-size:12px;font-weight:700;color:var(--txt2);margin:12px 0 6px;letter-spacing:.4px;text-transform:uppercase}
.cat-row{display:flex;gap:8px}
.cat-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--bg);text-align:center;cursor:pointer;font-size:20px;transition:all .15s}
.cat-btn .cat-lbl{display:block;font-size:10px;font-weight:600;color:var(--txt3);margin-top:2px}
.cat-btn.on{border-color:var(--pri);background:rgba(193,127,74,.08)}
.cat-btn.on .cat-lbl{color:var(--pri)}
.src-row{display:flex;gap:8px}
.src-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--bg);font-size:11px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .15s}
.src-btn .s-ico{font-size:20px}
.src-btn.on{border-color:var(--pri);background:rgba(193,127,74,.08);color:var(--pri)}
.m-inp{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;color:var(--txt);background:var(--bg);outline:none;font-family:inherit;box-sizing:border-box}
.m-inp:focus{border-color:var(--pri)}
.m-sel{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;color:var(--txt);background:var(--bg);outline:none;cursor:pointer;font-family:inherit;box-sizing:border-box}
.m-sel:focus{border-color:var(--pri)}
.cur-grp{display:flex;gap:8px}
.cur-sel{padding:10px 8px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;font-weight:700;color:var(--pri);background:var(--bg);outline:none;cursor:pointer;font-family:inherit}
.mem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mc{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--bg);cursor:pointer;transition:all .15s}
.mc.on{border-color:var(--pri);background:rgba(193,127,74,.08)}
.mc-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;font-weight:700;transition:all .15s}
.mc.on .mc-dot{background:var(--pri);border-color:var(--pri);color:#fff}
.mc-lbl{font-size:13px;font-weight:600;color:var(--txt)}
.mc.on .mc-lbl{color:var(--pri)}
.payer-row{display:flex;gap:6px;flex-wrap:wrap}
.pay-btn{padding:7px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg);font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .15s}
.pay-btn.on{border-color:var(--grn);background:var(--grn-lt);color:var(--grn)}
#photo-prev{width:100%;max-height:180px;object-fit:contain;border-radius:10px;border:1.5px solid var(--bdr);background:var(--bg2);display:none;margin-top:8px}
.ocr-spin{display:none;text-align:center;padding:10px;font-size:13px;color:var(--txt2)}
.sub-btn{width:100%;padding:13px;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;letter-spacing:.3px}
.sub-btn:active{opacity:.85}
.sub-btn:disabled{opacity:.45;cursor:not-allowed}
.cfg-note{font-size:11px;color:var(--txt3);margin-top:4px;line-height:1.6}
.sel-all{color:var(--pri);cursor:pointer;font-weight:600;font-size:11px;text-decoration:underline}
.sync-badge{font-size:10px;background:var(--grn);color:#fff;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:700;vertical-align:middle}
.sync-off{background:var(--txt3)}
</style>
<!-- Firebase Realtime DB SDK（選用，多人同步用） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="app">

<header id="hdr">
  <div class="hdr-sakura">🌸</div>
  <div class="hdr-text">
    <div class="hdr-title">別府溫泉・福岡城市漫遊</div>
    <div class="hdr-sub">2026 · 5/11 – 5/20 · 6人</div>

// RENDER: PACKING
// ═══════════════════════════════════════════════
function renderPack(){
  loadPack();
  const panel=document.getElementById('t-pack');
  const sv=panel.scrollTop;
  const all=Object.values(PACK).flat();
  const ck=all.filter(k=>packSt[k]).length;
  const tot=all.length;
  const pct=Math.round(ck/tot*100);

  const cats=Object.entries(PACK).map(([cat,items])=>{
    const rows=items.map(item=>`
      <div class="pi ${packSt[item]?'chk':''}" onclick="tgPack(${JSON.stringify(item)})">
        <div class="pi-box"></div>
        <div class="pi-txt">${item}</div>
      </div>`).join('');
    return`<div class="pack-cat"><div class="pack-cat-ttl">${cat}</div>${rows}</div>`;
  }).join('');

  panel.innerHTML=`
    <div class="pack-prog">
      <div class="prog-row"><span>行李準備進度</span><span>${ck} / ${tot} 項</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    ${cats}
    <div class="pack-note">住宿提供浴巾 / 拖鞋 / 吹風機<br>所有住宿有洗衣機，衣物可少帶</div>
    <div class="pad"></div>`;
  panel.scrollTop=sv;
}

let activBtn=null;

function speak(text,btn){
  if(!hasTTS) return;
  // cancel any ongoing speech
  window.speechSynthesis.cancel();
  if(activBtn){activBtn.classList.remove('speaking');activBtn.textContent='🔊';}
  if(activBtn===btn){activBtn=null;return;}

  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='ja-JP';
  utt.rate=0.85;
  utt.pitch=1;

  // pick a Japanese voice if available
  const voices=window.speechSynthesis.getVoices();
  const jaVoice=voices.find(v=>v.lang.startsWith('ja'));
  if(jaVoice) utt.voice=jaVoice;

  utt.onstart=()=>{btn.classList.add('speaking');btn.textContent='⏹️';activBtn=btn;};
  utt.onend=()=>{btn.classList.remove('speaking');btn.textContent='🔊';activBtn=null;};
  utt.onerror=()=>{btn.classList.remove('speaking');btn.textContent='🔊';activBtn=null;};

  window.speechSynthesis.speak(utt);
}

// ensure voices are loaded (Chrome loads them async)
if(hasTTS && window.speechSynthesis.onvoiceschanged!==undefined){
  window.speechSynthesis.onvoiceschanged=()=>{};
}

function calcSettlement(net){
  const cr=[],db=[];
  MEMBERS.forEach(m=>{
    const n=net[m]||0;
    if(n>0.5) cr.push({name:m,amt:n});
    else if(n<-0.5) db.push({name:m,amt:-n});
  });
  const txns=[],c=cr.map(x=>({...x})),d=db.map(x=>({...x}));
  let ci=0,di=0;
  while(ci<c.length&&di<d.length){
    const p=Math.min(c[ci].amt,d[di].amt);
    if(p>0.5) txns.push({from:d[di].name,to:c[ci].name,amount:p});
    c[ci].amt-=p; d[di].amt-=p;
    if(c[ci].amt<0.5) ci++;
    if(d[di].amt<0.5) di++;
  }
  return txns;
}

function shareSummary(){
  const data=getSplitData(),cfg=getSplitCfg(),rate=parseFloat(cfg.rate)||33;
  const owe={},net={};
  MEMBERS.forEach(m=>{owe[m]=0;net[m]=0;});
  data.forEach(e=>{
    const s=e.amount/e.members.length;
    e.members.forEach(m=>{owe[m]+=s;net[m]-=s;});
    net[e.payer]+=e.amount;
  });
  const txns=calcSettlement(net),total=data.reduce((s,e)=>s+e.amount,0);
  let txt=`🌸 北九州・別府溫泉・福岡漫遊 分帳結算\n總花費：¥${total.toLocaleString()}（≈RM${(total/rate).toFixed(0)}）\n\n💸 結清：\n`;
  if(!txns.length) txt+='全部已結清 🎉\n';
  else txns.forEach(t=>{txt+=`${t.from} → ${t.to}：¥${Math.round(t.amount).toLocaleString()}（≈RM${(t.amount/rate).toFixed(0)}）\n`;});
  txt+=`\n各人花費：\n`;
  MEMBERS.forEach(m=>{txt+=`${m}：¥${Math.round(owe[m]).toLocaleString()}（≈RM${(owe[m]/rate).toFixed(0)}）\n`;});
  navigator.clipboard?.writeText(txt).then(()=>alert('已複製，貼到 WhatsApp 即可 📲')).catch(()=>{
    const el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    alert('已複製，貼到 WhatsApp 即可 📲');
  });
}

async function onPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const url=e.target.result;
    const prev=document.getElementById('photo-prev');
    prev.src=url;prev.style.display='block';
    const cfg=getSplitCfg();
    if(!cfg.apiKey){alert('請先設定 Anthropic API Key（點右上角 ⚙️）');return;}
    const spin=document.getElementById('ocr-spin'),btn=document.getElementById('sub-btn');
    spin.style.display='block';btn.disabled=true;
    try{
      const r=await callOCR(url.split(',')[1],file.type||'image/jpeg');
      if(r){
        const n=document.getElementById('m-name'),a=document.getElementById('m-amt');
        if(r.name&&n)n.value=r.name;
        if(r.amount&&a)a.value=r.amount;
      }
    }catch{alert('辨識失敗，請手動輸入');}
    finally{spin.style.display='none';btn.disabled=false;}
  };
  reader.readAsDataURL(file);
}

async function callOCR(b64,mime){
  const cfg=getSplitCfg();
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':cfg.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:200,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:'這是日本餐廳收據，請辨識：1)店家名稱（翻成繁體中文）2)總金額（日圓，只要數字）。只回傳JSON格式：{"name":"店名","amount":1234}，無法辨識用null。'}
      ]}]
    })
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  const txt=d.content?.[0]?.text||'';
  const m=txt.match(/\{[^}]+\}/);
  if(m){try{return JSON.parse(m[0]);}catch{}}
  return null;
}
